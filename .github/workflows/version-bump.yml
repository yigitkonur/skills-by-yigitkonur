name: version-bump

# Auto-bump the patch version on every push to main so
# `/plugin marketplace update` sees a new version and refreshes installed
# plugins (including newly added skills and the researcher agents).
# Manual dispatch is retained for an on-demand force-bump.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to bump (must be main)
        required: true
        default: main
      confirm:
        description: Type bump-version to confirm
        required: true
concurrency:
  group: version-bump
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  bump:
    # On push: run for human commits, but never for the bot's own release
    # commit — it carries [skip ci] and a github-actions[bot] actor, so this
    # workflow cannot re-trigger itself (no infinite loop). GITHUB_TOKEN pushes
    # also do not re-trigger workflows, so this is belt-and-suspenders.
    # On manual dispatch: keep the explicit confirm gate.
    if: >-
      (github.event_name == 'push'
        && !contains(github.event.head_commit.message, '[skip ci]')
        && github.actor != 'github-actions[bot]')
      || (github.event_name == 'workflow_dispatch'
        && inputs.ref == 'main'
        && inputs.confirm == 'bump-version')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate skills
        run: python3 scripts/validate-skills.py
      - name: Bump patch version and regenerate plugin metadata
        id: bump
        run: |
          python3 scripts/bump-version.py
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION .claude-plugin/marketplace.json .codex-plugin/plugin.json .agents/plugins/marketplace.json plugins/
          if git diff --cached --quiet; then echo "nothing to bump"; exit 0; fi
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            echo "push rejected (attempt $attempt) — rebasing onto latest main and retrying"
            git pull --rebase origin main
            sleep 3
          done
          exit 1
