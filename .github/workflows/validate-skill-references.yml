name: Validate Skill References

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - 'scripts/generate-marketplace.py'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - 'scripts/generate-marketplace.py'

jobs:
  validate-references:
    name: Check all references are linked from SKILL.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill reference linkage
        run: |
          python3 << 'SCRIPT'
          import os, re, sys

          errors = []
          skills_checked = 0
          refs_checked = 0

          for skill_name in sorted(os.listdir('skills')):
              skill_dir = os.path.join('skills', skill_name)
              refs_dir = os.path.join(skill_dir, 'references')
              skill_md = os.path.join(skill_dir, 'SKILL.md')

              if not os.path.isdir(refs_dir) or not os.path.isfile(skill_md):
                  continue

              # Collect all .md files on disk under references/
              on_disk = set()
              for root, dirs, files in os.walk(refs_dir):
                  for f in files:
                      if f.endswith('.md'):
                          rel = os.path.relpath(os.path.join(root, f), skill_dir)
                          on_disk.add(rel)

              if not on_disk:
                  continue

              skills_checked += 1
              refs_checked += len(on_disk)

              # Extract all references/...md paths mentioned in SKILL.md
              with open(skill_md) as fh:
                  content = fh.read()
              referenced = set(re.findall(r'references/[^\s|)\x60\]]+\.md', content))

              orphaned = on_disk - referenced
              missing = referenced - on_disk

              for o in sorted(orphaned):
                  errors.append(f'{skill_name}: orphaned reference file not linked from SKILL.md: {o}')
              for m in sorted(missing):
                  errors.append(f'{skill_name}: SKILL.md references non-existent file: {m}')

          print(f'Checked {skills_checked} skills with {refs_checked} reference files')

          if errors:
              print(f'\n❌ {len(errors)} issue(s) found:\n')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\n✅ All reference files are properly linked from their SKILL.md')
              sys.exit(0)
          SCRIPT

  validate-marketplace:
    name: Check marketplace.json and plugin.json consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace and plugin manifests
        run: |
          python3 << 'SCRIPT'
          import json, os, sys

          errors = []

          # Check marketplace.json exists and is valid
          mp_path = '.claude-plugin/marketplace.json'
          if not os.path.isfile(mp_path):
              print('❌ .claude-plugin/marketplace.json not found')
              sys.exit(1)

          with open(mp_path) as f:
              marketplace = json.load(f)

          plugin_names = {p['name'] for p in marketplace['plugins']}

          # Check every skill directory has a marketplace entry and plugin.json
          for skill_name in sorted(os.listdir('skills')):
              skill_dir = os.path.join('skills', skill_name)
              if not os.path.isdir(skill_dir):
                  continue
              skill_md = os.path.join(skill_dir, 'SKILL.md')
              if not os.path.isfile(skill_md):
                  continue

              # Check marketplace entry exists
              if skill_name not in plugin_names:
                  errors.append(f'{skill_name}: missing from marketplace.json')

              # Check plugin.json exists and is valid
              pj_path = os.path.join(skill_dir, '.claude-plugin', 'plugin.json')
              if not os.path.isfile(pj_path):
                  errors.append(f'{skill_name}: missing .claude-plugin/plugin.json')
                  continue

              with open(pj_path) as f:
                  pj = json.load(f)

              if pj.get('name') != skill_name:
                  errors.append(f'{skill_name}: plugin.json name "{pj.get("name")}" != directory name')

              if not pj.get('version'):
                  errors.append(f'{skill_name}: plugin.json missing version field')

          print(f'Checked {len(plugin_names)} marketplace entries')

          if errors:
              print(f'\n❌ {len(errors)} issue(s) found:\n')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\n✅ All marketplace entries and plugin.json files are consistent')
              sys.exit(0)
          SCRIPT
