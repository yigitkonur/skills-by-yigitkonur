name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'

jobs:
  validate:
    name: Audit all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill validation
        id: validate
        continue-on-error: true
        run: python3 scripts/validate-skills.py

      - name: Report advisory failure
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::warning title=Skill validation failed::Validation is advisory in CI. Review the job log for exact file-level fixes."
