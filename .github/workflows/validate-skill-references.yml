name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - 'scripts/generate-marketplace.py'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - 'scripts/generate-marketplace.py'

jobs:
  validate-references:
    name: Check reference linkage (warnings only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill reference linkage
        run: |
          python3 << 'SCRIPT'
          import os, re, sys

          warnings = []
          skills_checked = 0
          refs_checked = 0

          for skill_name in sorted(os.listdir('skills')):
              skill_dir = os.path.join('skills', skill_name)
              refs_dir = os.path.join(skill_dir, 'references')
              skill_md = os.path.join(skill_dir, 'SKILL.md')

              if not os.path.isdir(refs_dir) or not os.path.isfile(skill_md):
                  continue

              on_disk = set()
              for root, dirs, files in os.walk(refs_dir):
                  for f in files:
                      if f.endswith('.md'):
                          rel = os.path.relpath(os.path.join(root, f), skill_dir)
                          on_disk.add(rel)

              if not on_disk:
                  continue

              skills_checked += 1
              refs_checked += len(on_disk)

              with open(skill_md) as fh:
                  content = fh.read()

              # Find all references/*.md paths, excluding globs and cross-skill refs
              raw_matches = re.findall(r'(?:skills/[^/]+/)?(references/[^\s|)\x60\]]+\.md)', content)
              # Also find full cross-skill paths to exclude their basename later
              cross_skill = set()
              for m in re.findall(r'skills/([^/]+/references/[^\s|)\x60\]]+\.md)', content):
                  # Extract just the references/... part from cross-skill paths
                  parts = m.split('/', 1)
                  if parts[0] != skill_name:
                      cross_skill.add(parts[1] if len(parts) > 1 else m)

              referenced = set()
              for r in raw_matches:
                  if '*' in r:
                      continue
                  if r in cross_skill:
                      continue
                  referenced.add(r)

              orphaned = on_disk - referenced
              missing = referenced - on_disk

              for o in sorted(orphaned):
                  warnings.append(f'{skill_name}: orphaned file not linked from SKILL.md: {o}')
              for m in sorted(missing):
                  warnings.append(f'{skill_name}: SKILL.md references missing file: {m}')

          print(f'Checked {skills_checked} skills with {refs_checked} reference files')

          if warnings:
              print(f'\n⚠️  {len(warnings)} warning(s):\n')
              for w in warnings:
                  print(f'  - {w}')
              print('\n(Reference warnings do not block the build)')
          else:
              print('\n✅ All reference files are properly linked')

          sys.exit(0)
          SCRIPT

  validate-marketplace:
    name: Check marketplace consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace and plugin manifests
        run: |
          python3 << 'SCRIPT'
          import json, os, sys

          errors = []

          mp_path = '.claude-plugin/marketplace.json'
          if not os.path.isfile(mp_path):
              print('❌ .claude-plugin/marketplace.json not found')
              sys.exit(1)

          with open(mp_path) as f:
              marketplace = json.load(f)

          plugin_names = {p['name'] for p in marketplace['plugins']}

          for skill_name in sorted(os.listdir('skills')):
              skill_dir = os.path.join('skills', skill_name)
              if not os.path.isdir(skill_dir):
                  continue
              skill_md = os.path.join(skill_dir, 'SKILL.md')
              if not os.path.isfile(skill_md):
                  continue

              if skill_name not in plugin_names:
                  errors.append(f'{skill_name}: missing from marketplace.json')

              pj_path = os.path.join(skill_dir, '.claude-plugin', 'plugin.json')
              if not os.path.isfile(pj_path):
                  errors.append(f'{skill_name}: missing .claude-plugin/plugin.json')
                  continue

              with open(pj_path) as f:
                  pj = json.load(f)

              if pj.get('name') != skill_name:
                  errors.append(f'{skill_name}: plugin.json name "{pj.get("name")}" != directory')

              if not pj.get('version'):
                  errors.append(f'{skill_name}: plugin.json missing version')

          print(f'Checked {len(plugin_names)} marketplace entries')

          if errors:
              print(f'\n❌ {len(errors)} issue(s):\n')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\n✅ Marketplace and plugin.json files are consistent')
              sys.exit(0)
          SCRIPT

  auto-bump-versions:
    name: Auto-bump changed skill versions
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed skills and bump versions
        run: |
          python3 << 'SCRIPT'
          import json, os, re, subprocess, sys

          def bump_patch(version):
              parts = version.split('.')
              return f'{parts[0]}.{parts[1]}.{int(parts[2]) + 1}'

          # Get files changed in the last commit
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
              capture_output=True, text=True
          )
          changed_files = result.stdout.strip().split('\n')

          # Find changed skills (files under skills/<name>/ but NOT .claude-plugin/plugin.json)
          changed_skills = set()
          for f in changed_files:
              m = re.match(r'^skills/([^/]+)/', f)
              if m and '.claude-plugin/plugin.json' not in f:
                  changed_skills.add(m.group(1))

          if not changed_skills:
              print('No skill content changes detected, skipping version bump')
              sys.exit(0)

          print(f'Changed skills: {", ".join(sorted(changed_skills))}')

          # Load marketplace.json
          mp_path = '.claude-plugin/marketplace.json'
          with open(mp_path) as f:
              marketplace = json.load(f)

          bumped = []
          for skill_name in sorted(changed_skills):
              # Bump plugin.json
              pj_path = os.path.join('skills', skill_name, '.claude-plugin', 'plugin.json')
              if not os.path.isfile(pj_path):
                  print(f'  SKIP {skill_name}: no plugin.json')
                  continue

              with open(pj_path) as f:
                  pj = json.load(f)

              old_ver = pj['version']
              new_ver = bump_patch(old_ver)
              pj['version'] = new_ver

              with open(pj_path, 'w') as f:
                  json.dump(pj, f, indent=2, ensure_ascii=False)
                  f.write('\n')

              # Bump marketplace.json entry
              for plugin in marketplace['plugins']:
                  if plugin['name'] == skill_name:
                      plugin['version'] = new_ver
                      break

              bumped.append(f'{skill_name}: {old_ver} -> {new_ver}')
              print(f'  {skill_name}: {old_ver} -> {new_ver}')

          if not bumped:
              print('No skills to bump')
              sys.exit(0)

          # Bump marketplace metadata version
          metadata = marketplace.setdefault('metadata', {})
          old_mp_ver = metadata.get('version', '1.0.0')
          new_mp_ver = bump_patch(old_mp_ver)
          metadata['version'] = new_mp_ver
          print(f'  marketplace metadata: {old_mp_ver} -> {new_mp_ver}')

          with open(mp_path, 'w') as f:
              json.dump(marketplace, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print(f'\nBumped {len(bumped)} skill(s)')
          SCRIPT

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json 'skills/*/.claude-plugin/plugin.json'
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: auto-bump versions for changed skills [skip ci]"
            git push
          fi
