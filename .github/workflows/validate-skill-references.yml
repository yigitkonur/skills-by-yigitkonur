name: Validate Skill References

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  validate-references:
    name: Check all references are linked from SKILL.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill reference linkage
        run: |
          python3 << 'SCRIPT'
          import os, re, sys

          errors = []
          skills_checked = 0
          refs_checked = 0

          for skill_name in sorted(os.listdir('skills')):
              skill_dir = os.path.join('skills', skill_name)
              refs_dir = os.path.join(skill_dir, 'references')
              skill_md = os.path.join(skill_dir, 'SKILL.md')

              if not os.path.isdir(refs_dir) or not os.path.isfile(skill_md):
                  continue

              # Collect all .md files on disk under references/
              on_disk = set()
              for root, dirs, files in os.walk(refs_dir):
                  for f in files:
                      if f.endswith('.md'):
                          rel = os.path.relpath(os.path.join(root, f), skill_dir)
                          on_disk.add(rel)

              if not on_disk:
                  continue

              skills_checked += 1
              refs_checked += len(on_disk)

              # Extract all references/...md paths mentioned in SKILL.md
              with open(skill_md) as fh:
                  content = fh.read()
              referenced = set(re.findall(r'references/[^\s|)\x60\]]+\.md', content))

              orphaned = on_disk - referenced
              missing = referenced - on_disk

              for o in sorted(orphaned):
                  errors.append(f'{skill_name}: orphaned reference file not linked from SKILL.md: {o}')
              for m in sorted(missing):
                  errors.append(f'{skill_name}: SKILL.md references non-existent file: {m}')

          print(f'Checked {skills_checked} skills with {refs_checked} reference files')

          if errors:
              print(f'\n❌ {len(errors)} issue(s) found:\n')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\n✅ All reference files are properly linked from their SKILL.md')
              sys.exit(0)
          SCRIPT
