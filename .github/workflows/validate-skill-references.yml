name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'

jobs:
  validate:
    name: Validate all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill validation
        run: python3 scripts/validate-skills.py
